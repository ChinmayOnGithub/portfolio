<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- GPU Chip Background -->
  <rect x="10" y="15" width="80" height="60" rx="4" fill="#1a1a2e" stroke="#16213e" stroke-width="2"/>
  
  <!-- GPU Grid Pattern -->
  <g stroke="#4a90e2" stroke-width="0.5" fill="none">
    <line x1="20" y1="25" x2="80" y2="25"/>
    <line x1="20" y1="35" x2="80" y2="35"/>
    <line x1="20" y1="45" x2="80" y2="45"/>
    <line x1="20" y1="55" x2="80" y2="55"/>
    <line x1="20" y1="65" x2="80" y2="65"/>
    <line x1="25" y1="20" x2="25" y2="70"/>
    <line x1="35" y1="20" x2="35" y2="70"/>
    <line x1="45" y1="20" x2="45" y2="70"/>
    <line x1="55" y1="20" x2="55" y2="70"/>
    <line x1="65" y1="20" x2="65" y2="70"/>
    <line x1="75" y1="20" x2="75" y2="70"/>
  </g>
  
  <!-- Kubernetes Hexagon -->
  <g transform="translate(50,45) scale(0.8)">
    <path d="M0,-12 L10.4,-6 L10.4,6 L0,12 L-10.4,6 L-10.4,-6 Z" fill="#326ce5" stroke="#fff" stroke-width="1"/>
    <!-- Kubernetes wheel -->
    <circle cx="0" cy="0" r="6" fill="none" stroke="#fff" stroke-width="1"/>
    <g stroke="#fff" stroke-width="0.8">
      <line x1="0" y1="-6" x2="0" y2="-3"/>
      <line x1="5.2" y1="-3" x2="2.6" y2="-1.5"/>
      <line x1="5.2" y1="3" x2="2.6" y2="1.5"/>
      <line x1="0" y1="6" x2="0" y2="3"/>
      <line x1="-5.2" y1="3" x2="-2.6" y2="1.5"/>
      <line x1="-5.2" y1="-3" x2="-2.6" y2="-1.5"/>
    </g>
  </g>
  
  <!-- Slice indicators -->
  <g fill="#00ff88" opacity="0.8">
    <circle cx="22" cy="27" r="1.5"/>
    <circle cx="30" cy="27" r="1.5"/>
    <circle cx="38" cy="27" r="1.5"/>
    <circle cx="62" cy="27" r="1.5"/>
    <circle cx="70" cy="27" r="1.5"/>
    <circle cx="78" cy="27" r="1.5"/>
    
    <circle cx="22" cy="37" r="1.5"/>
    <circle cx="38" cy="37" r="1.5"/>
    <circle cx="62" cy="37" r="1.5"/>
    <circle cx="78" cy="37" r="1.5"/>
    
    <circle cx="22" cy="53" r="1.5"/>
    <circle cx="30" cy="53" r="1.5"/>
    <circle cx="62" cy="53" r="1.5"/>
    <circle cx="70" cy="53" r="1.5"/>
    
    <circle cx="22" cy="63" r="1.5"/>
    <circle cx="38" cy="63" r="1.5"/>
    <circle cx="62" cy="63" r="1.5"/>
    <circle cx="78" cy="63" r="1.5"/>
  </g>
  
  <!-- Connection lines -->
  <g stroke="#4a90e2" stroke-width="1" fill="none" opacity="0.6">
    <path d="M15,80 Q50,85 85,80"/>
    <path d="M15,10 Q50,5 85,10"/>
  </g>
  
  <!-- Performance indicator -->
  <g transform="translate(75,85)" fill="#00ff88">
    <path d="M0,0 L-8,-4 L-8,-2 L-12,-2 L-12,2 L-8,2 L-8,4 Z"/>
    <text x="-20" y="2" font-family="monospace" font-size="6" fill="#00ff88">+96.7%</text>
  </g>
</svg>